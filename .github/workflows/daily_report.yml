name: 미국 증시 시황 보고서

on:
  schedule:
    # 매일 23:00 UTC = 매일 08:00 KST (딜레이 감안 → 08:30 도착 목표)
    - cron: '0 23 * * *'

  # 수동 테스트 실행 가능 (GitHub Actions 탭 → Run workflow)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 한국어 폰트 설치
        run: sudo apt-get install -y fonts-nanum

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 시황 보고서 생성 및 전송
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL_US: ${{ secrets.DISCORD_WEBHOOK_URL_US }}
        run: python main.py
