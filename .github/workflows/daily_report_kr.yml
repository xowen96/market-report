name: 국내 증시 시황 보고서

on:
  schedule:
    # 매일 07:00 UTC = 16:00 KST (장 마감 후 30분)
    - cron: '0 7 * * 1-5'

  # 수동 테스트 실행 가능
  workflow_dispatch:

jobs:
  send-kr-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 한국어 폰트 설치
        run: sudo apt-get install -y fonts-nanum

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 국내 증시 시황 보고서 생성 및 전송
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL_KR: ${{ secrets.DISCORD_WEBHOOK_URL_KR }}
        run: python kr_main.py
